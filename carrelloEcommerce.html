<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>High Delta - Carrello</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b1c2c,#1f3b5c);
    color:white;
    animation:fadeIn 1s ease-in;
}

.container { display:flex; height:100vh; }

.navbar {
    width:220px;
    padding:20px;
    background:rgba(255,255,255,0.05);
}

.center {
    flex:1;
    padding:20px;
}

.right {
    width:250px;
    padding:20px;
}

button {
    background:#1e90ff;
    padding:10px;
    border:none;
    color:white;
    border-radius:8px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

<div class="navbar">
    <a href="vetrinaEcommerce.html">Vetrina</a>
</div>

<div class="center" id="cartList"></div>

<div class="right">
    <h3>Totale</h3>
    <p id="total"></p>
    <button onclick="pdf()">Scarica PDF</button>
</div>

</div>

<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "registrazioneEcommerce.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let list = document.getElementById("cartList");

cart.forEach(p => {
    total += Number(p.prezzo);

    let div = document.createElement("div");
    div.innerHTML = `<p>${p.nome} - €${p.prezzo}</p>`;
    list.appendChild(div);
});

document.getElementById("total").innerText = "€ " + total;

function pdf() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("HIGH DELTA - RICEVUTA", 10, 10);

    let y = 20;
    cart.forEach(p => {
        doc.text(`${p.nome} - €${p.prezzo}`, 10, y);
        y += 10;
    });

    doc.text("Totale: €" + total, 10, y + 10);

    doc.save("ricevuta_high_delta.pdf");
}
</script>

</body>
</html>
