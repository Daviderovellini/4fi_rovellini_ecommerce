```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">

<title>Carrello - NewExpedetion</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1f1f1f;
    color:white;
}

.container{
    display:flex;
}

.sidebar{
    width:220px;
    min-height:100vh;
    background:#2b2b2b;
    padding:30px;
    border-right:3px solid #c9a227;
}

.logo{
    font-size:28px;
    color:#c9a227;
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    margin:20px 0;
    color:white;
    text-decoration:none;
}

.center{
    flex:2;
    padding:40px;
}

.right{
    width:350px;
    background:#2b2b2b;
    padding:40px;
}

.item{
    background:#2d2d2d;
    margin-bottom:20px;
    padding:20px;
    border-radius:10px;
}

button{
    width:100%;
    padding:15px;
    background:#c9a227;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#f0c94d;
}

</style>
</head>
<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){
    window.location.href = "registrazioneEcommerce.html";
}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">NewExpedetion</div>

<a href="registrazioneEcommerce.html">Registrazione</a>
<a href="loginEcommerce.html">Login</a>
<a href="vetrinaEcommerce.html">Vetrina</a>
<a href="carrelloEcommerce.html">Carrello</a>

</div>

<div class="center">

<h1>Il tuo carrello</h1>

<div id="lista"></div>

</div>

<div class="right">

<h2>Riepilogo</h2>

<h3 id="totale">Totale: € 0</h3>

<br>

<button onclick="generaPDF()">
Scarica Ricevuta PDF
</button>

</div>

</div>

<script>

let carrello = JSON.parse(localStorage.getItem("carrello")) || [];

let totale = 0;

carrello.forEach(prodotto => {

    totale += Number(prodotto.prezzo);

    document.getElementById("lista").innerHTML += `
    
    <div class="item">
    
    <h2>${prodotto.nome}</h2>
    <p>Prezzo: € ${prodotto.prezzo}</p>
    
    </div>
    
    `;

});

document.getElementById("totale").innerText =
"Totale: € " + totale;

function generaPDF(){

    const { jsPDF } = window.jspdf;

    let doc = new jsPDF();

    let utente = JSON.parse(localStorage.getItem("utente"));

    doc.setFont("courier");

    doc.text("NEWEXPEDETION", 20, 20);

    doc.text("Ricevuta Acquisto", 20, 30);

    doc.text("Cliente: " + utente.nome, 20, 40);

    doc.text("Data: " + new Date().toLocaleDateString(), 20, 50);

    let y = 70;

    carrello.forEach(p => {

        doc.text(
            p.nome + " - € " + p.prezzo,
            20,
            y
        );

        y += 10;

    });

    doc.text("Totale Finale: € " + totale, 20, y + 20);

    doc.save("ricevuta_NewExpedetion.pdf");

}

</script>

</body>
</html>
