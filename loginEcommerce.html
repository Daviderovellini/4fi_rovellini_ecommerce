<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>High Delta - Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0b1c2c, #1f3b5c);
    color: #f5f7ff;
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

.container { display:flex; height:100vh; }

.navbar {
    width: 220px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    gap:10px;
}

.navbar a {
    color:white;
    text-decoration:none;
    padding:8px;
}

.center {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box {
    background: rgba(255,255,255,0.08);
    padding:30px;
    border-radius:12px;
}

input, button {
    width:100%;
    margin:8px 0;
    padding:10px;
    border:none;
    border-radius:8px;
}

button { background:#1e90ff; color:white; }

.right {
    width:300px;
    padding:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="navbar">
    <a href="registrazioneEcommerce.html">Registrazione</a>
    <a href="loginEcommerce.html">Login</a>
    <a href="vetrinaEcommerce.html">Vetrina</a>
    <a href="carrelloEcommerce.html">Carrello</a>
</div>

<div class="center">
    <div class="box">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Accedi</button>
    </div>
</div>

<div class="right">
    <h3>Benvenuto in High Delta</h3>
    <ul>
        <li>Accesso jet esclusivi</li>
        <li>Carrello personalizzato</li>
        <li>Offerte riservate</li>
    </ul>
</div>

</div>

<script>
function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if (user && user.email === email && user.password === password) {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "vetrinaEcommerce.html";
    } else {
        alert("Credenziali errate!");
    }
}
</script>

</body>
</html>
