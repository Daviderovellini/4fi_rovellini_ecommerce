```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HighDelta</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#1f1f1f;
    color:white;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
    animation:fadeIn 1s ease;
}

.sidebar{
    width:220px;
    background:#2b2b2b;
    padding:30px;
    border-right:3px solid #c9a227;
}

.logo{
    color:#c9a227;
    font-size:28px;
    margin-bottom:40px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    margin:20px 0;
}

.sidebar a{
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    color:#c9a227;
    padding-left:10px;
}

.center{
    width:35%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.form-box{
    width:100%;
    background:#2d2d2d;
    padding:40px;
    border-radius:15px;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#444;
    color:white;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#c9a227;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#f0c94d;
}

.right{
    flex:1;
    padding:60px;
    display:flex;
    justify-content:center;
    flex-direction:column;
}

.right h1{
    color:#c9a227;
    margin-bottom:20px;
}

.right ul{
    margin-top:20px;
    line-height:2;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

</style>
</head>
<body>

<div class="container">

<div class="sidebar">

<div class="logo">NewExpedetion</div>

<ul>
<li><a href="registrazioneEcommerce.html">Registrazione</a></li>
<li><a href="loginEcommerce.html">Login</a></li>
<li><a href="vetrinaEcommerce.html">Vetrina</a></li>
<li><a href="carrelloEcommerce.html">Carrello</a></li>
</ul>

</div>

<div class="center">

<div class="form-box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Accedi</button>

</div>

</div>

<div class="right">

<h1>Area Riservata</h1>

<p>Accedi alla piattaforma premium NewExpedetion.</p>

<ul>
<li>✔ Accesso ai jet esclusivi</li>
<li>✔ Preventivi personalizzati</li>
<li>✔ Supporto dedicato</li>
<li>✔ Gestione ordini privata</li>
</ul>

</div>

</div>

<script>

function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let utente = JSON.parse(localStorage.getItem("utente"));

    if(utente.email === email && utente.password === password){

        localStorage.setItem("isLoggedIn", true);

        alert("Login effettuato!");

        window.location.href = "vetrinaEcommerce.html";

    }else{
        alert("Credenziali errate.");
    }

}

</script>

</body>
</html>
