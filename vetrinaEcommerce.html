<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>High Delta - Vetrina</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0b1c2c,#1f3b5c);
    color:white;
    animation:fadeIn 1s ease-in;
}

@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

.container { display:flex; height:100vh; }

.navbar {
    width:220px;
    padding:20px;
    background:rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
}

.navbar a {
    color:white;
    margin:5px 0;
}

.center {
    flex:1;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.card {
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
}

button {
    background:#1e90ff;
    border:none;
    padding:8px;
    color:white;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="navbar">
    <a href="registrazioneEcommerce.html">Registrazione</a>
    <a href="loginEcommerce.html">Login</a>
    <a href="vetrinaEcommerce.html">Vetrina</a>
    <a href="carrelloEcommerce.html">Carrello (<span id="cartCount">0</span>)</a>
</div>

<div class="center" id="products"></div>

</div>

<script>
if (localStorage.getItem("isLoggedIn") !== "true") {
    window.location.href = "registrazioneEcommerce.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCart() {
    document.getElementById("cartCount").innerText = cart.length;
}

function addToCart(p) {
    cart.push(p);
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCart();
}

fetch("prodotti.csv")
.then(res => res.text())
.then(data => {
    let rows = data.split("\n").slice(1);
    let container = document.getElementById("products");

    rows.forEach(r => {
        let cols = r.split(",");

        if (cols.length < 6) return;

        let product = {
            nome: cols[0],
            marca: cols[1],
            descrizione: cols[2],
            prezzo: cols[4],
            dimensioni: cols[5]
        };

        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <h3>${product.nome}</h3>
            <p>${product.descrizione}</p>
            <p>€ ${product.prezzo}</p>
            <button onclick='addToCart(${JSON.stringify(product)})'>Aggiungi</button>
        `;

        container.appendChild(div);
    });
});

updateCart();
</script>

</body>
</html>
