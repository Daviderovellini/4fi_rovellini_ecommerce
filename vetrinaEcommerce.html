```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Vetrina - NewExpedetion</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1f1f1f;
    color:white;
}

.container{
    display:flex;
}

.sidebar{
    width:220px;
    min-height:100vh;
    background:#2b2b2b;
    padding:30px;
    border-right:3px solid #c9a227;
}

.logo{
    color:#c9a227;
    font-size:28px;
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    margin:20px 0;
    color:white;
    text-decoration:none;
}

.content{
    flex:1;
    padding:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card{
    background:#2d2d2d;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
    animation:fadeIn 1s ease;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

button{
    width:100%;
    padding:12px;
    background:#c9a227;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#f0c94d;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>
<body>

<script>

if(localStorage.getItem("isLoggedIn") != "true"){
    window.location.href = "registrazioneEcommerce.html";
}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">NewExpedetion</div>

<a href="registrazioneEcommerce.html">Registrazione</a>
<a href="loginEcommerce.html">Login</a>
<a href="vetrinaEcommerce.html">Vetrina</a>
<a href="carrelloEcommerce.html">
Carrello (<span id="counter">0</span>)
</a>

</div>

<div class="content">

<h1>I Nostri Jet</h1>

<div class="grid" id="grid"></div>

</div>

</div>

<script>

let carrello = JSON.parse(localStorage.getItem("carrello")) || [];

aggiornaCounter();

fetch("prodotti.csv")
.then(response => response.text())
.then(data => {

    let righe = data.split("\n");

    righe.shift();

    righe.forEach(riga => {

        let colonne = riga.split(",");

        let nome = colonne[0];
        let marca = colonne[1];
        let descrizione = colonne[2];
        let immagine = colonne[3];
        let prezzo = colonne[4];
        let dimensioni = colonne[5];
        let taglia = colonne[6];
        let spedizione = colonne[7];

        let card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
        
        <img src="${immagine}">
        
        <div class="card-content">
        
        <h2>${nome}</h2>
        <h3>${marca}</h3>
        <p>${descrizione}</p>
        <p><b>Dimensioni:</b> ${dimensioni}</p>
        <p><b>Taglia:</b> ${taglia}</p>
        <p><b>Spedizione:</b> ${spedizione}</p>
        <p><b>Prezzo:</b> € ${prezzo}</p>

        <button onclick='aggiungiCarrello(${JSON.stringify({
            nome,
            prezzo
        })})'>
        Aggiungi al carrello
        </button>

        </div>
        
        `;

        document.getElementById("grid").appendChild(card);

    });

});

function aggiungiCarrello(prodotto){

    carrello.push(prodotto);

    localStorage.setItem("carrello", JSON.stringify(carrello));

    aggiornaCounter();

    alert("Jet aggiunto al carrello!");

}

function aggiornaCounter(){

    document.getElementById("counter").innerText = carrello.length;

}

</script>

</body>
</html>
```
